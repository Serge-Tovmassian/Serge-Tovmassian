<svg width="1180" height="610" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#050912"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="offset" values="1;0.6;1" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#7C3AED;#22D3EE" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#7C3AED" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowEmerald" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="pillGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="rounded">
      <rect x="0" y="0" width="1180" height="610" rx="24"/>
    </clipPath>

    <mask id="asciiReveal">
      <rect x="0" y="0" width="0" height="360">
        <animate attributeName="width" values="0;340;340" keyTimes="0;0.5;1" dur="4s" fill="freeze"/>
      </rect>
    </mask>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="1180" height="610" fill="url(#bgGrad)"/>

    <!-- ambient floating glows -->
    <circle cx="180" cy="120" r="220" fill="url(#glowBlue)">
      <animate attributeName="cy" values="120;150;120" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="480" r="260" fill="url(#glowCyan)">
      <animate attributeName="cx" values="950;900;950" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="80" r="200" fill="url(#glowEmerald)">
      <animate attributeName="cy" values="80;60;80" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- subtle noise -->
    <rect width="1180" height="610" opacity="0.03">
      <animate attributeName="opacity" values="0.02;0.05;0.02" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- outer border shimmer -->
    <rect x="1.5" y="1.5" width="1177" height="607" rx="24" fill="none" stroke="url(#accentGrad)" stroke-width="1.4" opacity="0.55"/>

    <!-- moving scanline across whole canvas -->
    <rect x="0" y="-40" width="1180" height="40" fill="#22D3EE" opacity="0.04">
      <animate attributeName="y" values="-40;610" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- ================= LEFT PANEL ================= -->
    <g>
      <rect x="24" y="24" width="424" height="562" rx="20" fill="#0F172A" opacity="0.55" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
      <rect x="24" y="24" width="424" height="562" rx="20" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3"/>

      <!-- glass reflection -->
      <rect x="24" y="24" width="424" height="140" rx="20" fill="#FFFFFF" opacity="0.03"/>

      <g mask="url(#asciiReveal)" transform="translate(70,70)">
        <g font-family="Menlo, Consolas, monospace" font-size="12" fill="url(#asciiGrad)" filter="url(#softGlow)">
          <animateTransform attributeName="transform" type="translate" values="0,0; 0,-4; 0,0" dur="4.5s" repeatCount="indefinite" additive="sum"/>
          <text x="0" y="0">        ╭──────────────╮</text>
          <text x="0" y="18">        │  ░░░░░░░░░░  │</text>
          <text x="0" y="36">        │ ░▓▓▓▓▓▓▓▓▓▓░ │</text>
          <text x="0" y="54">        │ ▓▓░░░░░░░░▓▓ │</text>
          <text x="0" y="72">        │ ▓▓  ◉  ◉ ▓▓ │</text>
          <text x="0" y="90">        │ ▓▓░░░░░░░░▓▓ │</text>
          <text x="0" y="108">        │ ░▓▓░▔▔▔░▓▓░ │</text>
          <text x="0" y="126">        │  ░▓▓▓▓▓▓▓░  │</text>
          <text x="0" y="144">        ╰──────────────╯</text>
          <text x="0" y="172">     ╭─[ SERGE.T ]───────╮</text>
          <text x="0" y="190">     │ role: dev.fullstack │</text>
          <text x="0" y="208">     │ base: nancy, fr     │</text>
          <text x="0" y="226">     │ stack: react/node   │</text>
          <text x="0" y="244">     │ status: online ●    │</text>
          <text x="0" y="262">     ╰─────────────────────╯</text>
        </g>
      </g>

      <!-- blinking cursor -->
      <rect x="95" y="345" width="10" height="16" fill="#22D3EE" opacity="1">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- ================= RIGHT PANEL (terminal) ================= -->
    <g transform="translate(468,24)">
      <rect x="0" y="0" width="688" height="562" rx="20" fill="#0F172A" opacity="0.65" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
      <rect x="0" y="0" width="688" height="562" rx="20" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.35"/>

      <!-- terminal titlebar -->
      <rect x="0" y="0" width="688" height="38" rx="20" fill="#0B1220" opacity="0.8"/>
      <rect x="0" y="20" width="688" height="18" fill="#0B1220" opacity="0.8"/>
      <circle cx="24" cy="19" r="6" fill="#EF4444" opacity="0.8"/>
      <circle cx="46" cy="19" r="6" fill="#F59E0B" opacity="0.8"/>
      <circle cx="68" cy="19" r="6" fill="#10B981" opacity="0.8"/>
      <text x="344" y="24" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8">serge@awaken-code — zsh</text>

      <g font-family="Menlo, Consolas, monospace" fill="#F8FAFC">
        <!-- greeting -->
        <text x="32" y="76" font-size="20" font-weight="600" fill="#F8FAFC" opacity="0">
          Hi 👋 I'm Serge
          <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.6s" fill="freeze"/>
        </text>

        <!-- typing roles -->
        <text x="32" y="106" font-size="15" fill="url(#asciiGrad)" filter="url(#softGlow)">
          <tspan>
            <animate attributeName="opacity" values="1" begin="0s" dur="0.1s" fill="freeze"/>
          </tspan>
          Frontend Engineer
          <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" begin="1s" dur="3s" repeatCount="indefinite"/>
        </text>
        <text x="32" y="106" font-size="15" fill="url(#asciiGrad)" filter="url(#softGlow)" opacity="0">
          Full Stack Developer
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.02;0.1;0.85;1" begin="4s" dur="3s" repeatCount="indefinite"/>
        </text>
        <text x="32" y="106" font-size="15" fill="url(#asciiGrad)" filter="url(#softGlow)" opacity="0">
          Open Source Contributor
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.02;0.1;0.85;1" begin="7s" dur="3s" repeatCount="indefinite"/>
        </text>
        <text x="32" y="106" font-size="15" fill="url(#asciiGrad)" filter="url(#softGlow)" opacity="0">
          UI Engineer
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.02;0.1;0.85;1" begin="10s" dur="3s" repeatCount="indefinite"/>
        </text>
        <text x="32" y="106" font-size="15" fill="url(#asciiGrad)" filter="url(#softGlow)" opacity="0">
          AI Enthusiast
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.02;0.1;0.85;1" begin="13s" dur="3s" repeatCount="indefinite"/>
        </text>
        <rect x="230" y="94" width="9" height="15" fill="#22D3EE">
          <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
        </rect>

        <!-- info rows, sequential reveal -->
        <g font-size="13" fill="#94A3B8">
          <text x="32" y="150" opacity="0">📍 Location: Nancy, France
            <animate attributeName="opacity" values="0;1" begin="1s" dur="0.5s" fill="freeze"/>
          </text>
          <text x="32" y="174" opacity="0">🎓 Education: BUT Informatique — IUT Nancy Charlemagne
            <animate attributeName="opacity" values="0;1" begin="1.5s" dur="0.5s" fill="freeze"/>
          </text>
          <text x="32" y="198" opacity="0">🎯 Current Focus: Alternance BUT3 — Dev Web
            <animate attributeName="opacity" values="0;1" begin="2s" dur="0.5s" fill="freeze"/>
          </text>
          <text x="32" y="222" opacity="0">🌐 Portfolio: awaken-code.dev
            <animate attributeName="opacity" values="0;1" begin="2.5s" dur="0.5s" fill="freeze"/>
          </text>
          <text x="32" y="246" opacity="0">✉️ Email: contact@awaken-code.dev
            <animate attributeName="opacity" values="0;1" begin="3s" dur="0.5s" fill="freeze"/>
          </text>
        </g>

        <!-- divider -->
        <rect x="32" y="270" width="624" height="1" fill="rgba(255,255,255,.08)"/>

        <text x="32" y="298" font-size="13" fill="#94A3B8" letter-spacing="1">SKILLS</text>

        <!-- skill pills -->
        <g font-size="12" font-family="Menlo, Consolas, monospace">
          <!-- row 1 -->
          <g transform="translate(32,312)">
            <rect x="0" y="0" width="66" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="33" y="19" text-anchor="middle" fill="#F8FAFC">React</text>
          </g>
          <g transform="translate(106,312)">
            <rect x="0" y="0" width="76" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="38" y="19" text-anchor="middle" fill="#F8FAFC">Next.js</text>
          </g>
          <g transform="translate(190,312)">
            <rect x="0" y="0" width="82" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="41" y="19" text-anchor="middle" fill="#F8FAFC">Node.js</text>
          </g>
          <g transform="translate(280,312)">
            <rect x="0" y="0" width="96" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="48" y="19" text-anchor="middle" fill="#F8FAFC">TypeScript</text>
          </g>
          <g transform="translate(384,312)">
            <rect x="0" y="0" width="90" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="45" y="19" text-anchor="middle" fill="#F8FAFC">Tailwind</text>
          </g>
          <g transform="translate(482,312)">
            <rect x="0" y="0" width="76" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="38" y="19" text-anchor="middle" fill="#F8FAFC">Python</text>
          </g>
          <g transform="translate(566,312)">
            <rect x="0" y="0" width="74" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="37" y="19" text-anchor="middle" fill="#F8FAFC">Docker</text>
          </g>

          <!-- row 2 -->
          <g transform="translate(32,350)">
            <rect x="0" y="0" width="92" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="46" y="19" text-anchor="middle" fill="#F8FAFC">Postgres</text>
          </g>
          <g transform="translate(132,350)">
            <rect x="0" y="0" width="66" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="33" y="19" text-anchor="middle" fill="#F8FAFC">AWS</text>
          </g>
          <g transform="translate(206,350)">
            <rect x="0" y="0" width="58" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="29" y="19" text-anchor="middle" fill="#F8FAFC">Git</text>
          </g>
          <g transform="translate(272,350)">
            <rect x="0" y="0" width="72" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="36" y="19" text-anchor="middle" fill="#F8FAFC">Figma</text>
          </g>
          <g transform="translate(352,350)">
            <rect x="0" y="0" width="76" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1" filter="url(#pillGlow)"/>
            <text x="38" y="19" text-anchor="middle" fill="#F8FAFC">MongoDB</text>
          </g>

          <!-- hover-style pulsing pill to suggest interactivity -->
          <g transform="translate(436,350)">
            <rect x="0" y="0" width="82" height="28" rx="14" fill="#111827" stroke="url(#accentGrad)" stroke-width="1.6" filter="url(#pillGlow)">
              <animate attributeName="stroke-width" values="1;2;1" dur="2.4s" repeatCount="indefinite"/>
            </rect>
            <text x="41" y="19" text-anchor="middle" fill="#F8FAFC">Vercel</text>
          </g>
        </g>

        <!-- divider -->
        <rect x="32" y="404" width="624" height="1" fill="rgba(255,255,255,.08)"/>

        <text x="32" y="432" font-size="13" fill="#94A3B8" letter-spacing="1">CONNECT</text>

        <!-- social icons -->
        <g transform="translate(32,450)" filter="url(#softGlow)">
          <!-- github -->
          <circle cx="16" cy="16" r="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.4"/>
          <path d="M16 6c-5.5 0-10 4.5-10 10 0 4.4 2.9 8.1 6.8 9.4.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.3-3.4-1.3-.5-1.1-1.1-1.4-1.1-1.4-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.6.3-1.1.6-1.3-2.2-.2-4.5-1.1-4.5-4.9 0-1.1.4-2 1-2.6-.1-.2-.4-1.2.1-2.6 0 0 .8-.3 2.8 1 .8-.2 1.7-.3 2.6-.3.9 0 1.8.1 2.6.3 2-1.3 2.8-1 2.8-1 .5 1.4.2 2.4.1 2.6.6.7 1 1.6 1 2.6 0 3.8-2.3 4.6-4.5 4.9.4.3.7.9.7 1.8v2.6c0 .3.2.6.7.5 3.9-1.3 6.8-5 6.8-9.4 0-5.5-4.5-10-10-10z" fill="#F8FAFC" transform="scale(0.62) translate(9,9)"/>

          <!-- linkedin -->
          <g transform="translate(48,0)">
            <circle cx="16" cy="16" r="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.4"/>
            <rect x="10" y="13" width="3" height="10" fill="#F8FAFC"/>
            <circle cx="11.5" cy="9.5" r="1.7" fill="#F8FAFC"/>
            <path d="M16 13h3v1.6c.5-.9 1.6-1.8 3.2-1.8 3 0 3.8 1.6 3.8 4.4v6.8h-3v-6.1c0-1.4-.5-2.4-1.8-2.4-1.4 0-2.2 1-2.2 2.4v6.1h-3z" fill="#F8FAFC"/>
          </g>

          <!-- twitter/x -->
          <g transform="translate(96,0)">
            <circle cx="16" cy="16" r="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.4"/>
            <path d="M10 10l12 12M22 10L10 22" stroke="#F8FAFC" stroke-width="1.8" stroke-linecap="round"/>
          </g>

          <!-- portfolio -->
          <g transform="translate(144,0)">
            <circle cx="16" cy="16" r="16" fill="none" stroke="url(#accentGrad)" stroke-width="1.4"/>
            <circle cx="16" cy="16" r="7.5" fill="none" stroke="#F8FAFC" stroke-width="1.4"/>
            <path d="M8.5 16h15M16 8.5c2.5 2 2.5 13-0 15M16 8.5c-2.5 2-2.5 13 0 15" fill="none" stroke="#F8FAFC" stroke-width="1.2"/>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
